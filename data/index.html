<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球新聞導航</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        #error-log { 
            display: none; background: #fee; color: #b00; padding: 20px; 
            border: 1px solid #fcc; border-radius: 8px; margin-bottom: 20px;
            font-family: monospace; white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <h2 class="fw-bold mb-4">🌐 全球新聞導航系統</h2>
        
        <div id="error-log"></div>

        <div id="news-container" class="row">
            <div class="col-12 text-center py-5" id="loading-spinner">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-3">正在解碼地緣政治數據...</p>
            </div>
        </div>
    </div>

    <script>
        async function loadAndRender() {
            const container = document.getElementById('news-container');
            const errorLog = document.getElementById('error-log');
            const spinner = document.getElementById('loading-spinner');

            try {
                // 強制使用相對路徑，並加上時間戳防止快取
                const url = `data/news_sources.json?t=${new Date().getTime()}`;
                console.log("Fetching from:", url);

                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`連線失敗！狀態碼：${response.status}\n請檢查 data/news_sources.json 是否真的在 data 資料夾內。`);
                }

                const rawText = await response.text(); // 先抓取原始文字
                let data;
                
                try {
                    data = JSON.parse(rawText); // 嘗試解析
                } catch (jsonErr) {
                    throw new Error(`JSON 格式損壞！\n錯誤原因：${jsonErr.message}\n\n這通常是因為您的 JSON 檔案裡多了或少了括號、逗號。`);
                }

                spinner.style.display = 'none';
                
                if (data.length === 0) {
                    container.innerHTML = '<div class="alert alert-warning">資料庫內尚無媒體資料。</div>';
                    return;
                }

                let html = '';
                data.forEach((item, index) => {
                    html += `
                        <div class="col-md-6 mb-4">
                            <div class="card h-100 p-4">
                                <div class="d-flex justify-content-between align-items-start mb-3">
                                    <h5 class="fw-bold mb-0">${item.media_name}</h5>
                                    <span class="badge bg-dark">${item.geopolitical_block}</span>
                                </div>
                                <p class="text-muted small">${item.geographic_info.continent} · ${item.attributes.media_type}</p>
                                <div class="p-3 bg-light rounded border-start border-primary border-4 mb-3">
                                    <strong>現實主義評註：</strong><br>${item.realist_note}
                                </div>
                                <div class="mt-auto">
                                    <a href="${item.links.official_url}" target="_blank" class="btn btn-primary btn-sm">訪問媒體</a>
                                    <span class="text-muted ms-2" style="font-size: 0.7rem;">校驗：${new Date(item.status.verified_at).toLocaleDateString()}</span>
                                </div>
                            </div>
                        </div>`;
                });
                container.innerHTML = html;

            } catch (err) {
                spinner.style.display = 'none';
                errorLog.style.display = 'block';
                errorLog.innerText = `⚠️ 系統故障報告：\n------------------------\n${err.message}`;
                console.error(err);
            }
        }

        window.onload = loadAndRender;
    </script>
</body>
</html>
