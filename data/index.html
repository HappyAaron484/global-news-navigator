<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球新聞導航</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .card { border: none; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        #debug-panel { 
            background: #2d2d2d; color: #00ff00; padding: 15px; 
            font-family: monospace; font-size: 13px; border-radius: 8px;
            margin-bottom: 20px; border-left: 5px solid #ff0000;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <h2 class="mb-4 fw-bold">🌐 全球新聞導航 <small class="text-muted" style="font-size: 0.9rem;">(Debug Mode)</small></h2>
        
        <div id="debug-panel">系統初始化中...</div>

        <div id="news-container" class="row">
            </div>
    </div>

    <script>
        // 3W: Who: Senior Analyst / Where: Frontend Debugger / When: 2026-03-18
        
        async function startApp() {
            const debug = document.getElementById('debug-panel');
            const container = document.getElementById('news-container');

            // 1. 檢測路徑環境
            const currentUrl = window.location.href;
            debug.innerText = `[1/3] 當前網址: ${currentUrl}\n`;

            try {
                // 2. 嘗試讀取資料 (加上隨機參數防止 GitHub 強制快取舊檔案)
                const jsonPath = '/data/news_sources.json?v=' + Date.now();
                debug.innerText += `[2/3] 正在請求資料: ${jsonPath}\n`;

                const response = await fetch(jsonPath);
                
                if (!response.ok) {
                    throw new Error(`HTTP 讀取失敗! 錯誤碼: ${response.status} (請檢查 data 資料夾是否正確)`);
                }

                const data = await response.json();
                debug.innerText += `[3/3] 成功讀取到 ${data.length} 筆資料！\n`;
                debug.style.borderColor = "#00ff00"; // 成功時變綠色

                // 3. 渲染資料
                if (data.length === 0) {
                    container.innerHTML = '<div class="col-12 text-center">JSON 檔案是空的。</div>';
                }

                let htmlContent = '';
                data.forEach(item => {
                    htmlContent += `
                        <div class="col-md-6 mb-4">
                            <div class="card h-100 p-3">
                                <span class="badge bg-dark w-25 mb-2">${item.geopolitical_block}</span>
                                <h5 class="fw-bold">${item.media_name}</h5>
                                <p class="text-secondary small">${item.geographic_info.continent} · ${item.attributes.media_type}</p>
                                <div class="p-2 bg-light rounded mb-3" style="font-size: 0.85rem;">
                                    <strong>評註：</strong>${item.realist_note}
                                </div>
                                <a href="${item.links.official_url}" target="_blank" class="btn btn-primary btn-sm w-50">訪問來源</a>
                            </div>
                        </div>`;
                });
                container.innerHTML = htmlContent;

            } catch (err) {
                // 錯誤捕捉
                debug.innerText += `\n❌ 發生錯誤:\n${err.message}`;
                debug.style.color = "#ff4d4d";
                console.error(err);
            }
        }

        window.onload = startApp;
    </script>
</body>
</html>
