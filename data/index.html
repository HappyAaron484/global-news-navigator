<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;">
    <title>全球新聞導航 - 地緣政治視角</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .block-tag { font-size: 0.8rem; padding: 2px 8px; border-radius: 4px; }
        .realist-note { font-style: italic; color: #555; font-size: 0.9rem; border-left: 3px solid #0d6efd; padding-left: 10px; background: #f8f9fa; padding: 10px; border-radius: 0 5px 5px 0; }
        .card { transition: all 0.2s; border: 1px solid #dee2e6; }
        .card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        #debug-console { font-family: monospace; font-size: 0.8rem; background: #222; color: #0f0; padding: 15px; display: none; margin-bottom: 20px; border-radius: 5px; }
    </style>
</head>
<body class="bg-light text-dark">
    <nav class="navbar navbar-dark bg-dark mb-4 shadow">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Global News Navigator <small class="text-secondary" style="font-size: 0.8rem;">Realist Analysis Edition</small></span>
        </div>
    </nav>

    <div class="container py-3">
        <div id="debug-console">系統診斷中...</div>

        <div id="news-container" class="row">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted">正在載入地緣政治數據庫...</p>
            </div>
        </div>
    </div>

    <script>
        // 3W 標註: Who: Senior Analyst / Where: GitHub Pages Frontend / When: 2026-03-18
        
        async function loadNews() {
            const container = document.getElementById('news-container');
            const debug = document.getElementById('debug-console');
            
            // 使用時間戳防止 GitHub Pages 強制快取
            const dataUrl = `data/news_sources.json?t=${new Date().getTime()}`;

            try {
                const response = await fetch(dataUrl);
                
                if (!response.ok) {
                    throw new Error(`HTTP 請求失敗: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();
                
                if (!Array.isArray(data)) {
                    throw new Error("JSON 格式錯誤：預期為陣列清單，請檢查 [ ] 括號。");
                }

                container.innerHTML = ''; // 清除讀取動畫

                data.forEach(item => {
                    // 使用標準 DOM 構建方式或乾淨的 Template Literal
                    const cardHtml = `
                        <div class="col-lg-6 col-xl-4 mb-4">
                            <div class="card h-100 shadow-sm">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <h5 class="card-title fw-bold m-0">${item.media_name}</h5>
                                        <span class="badge bg-primary block-tag">${item.geopolitical_block}</span>
                                    </div>
                                    <p class="text-muted small mb-2">${item.geographic_info.continent} | ${item.attributes.media_type}</p>
                                    <hr>
                                    <div class="realist-note mb-3">
                                        <strong>現實主義評註：</strong><br>${item.realist_note}
                                    </div>
                                    <div class="d-grid gap-2 d-md-block">
                                        <a href="${item.links.official_url}" target="_blank" class="btn btn-sm btn-dark">官方網站</a>
                                        ${item.links.rss_feed ? `<a href="${item.links.rss_feed}" target="_blank" class="btn btn-sm btn-outline-secondary">RSS Feed</a>` : ''}
                                    </div>
                                </div>
                                <div class="card-footer bg-transparent border-top-0 text-muted small">
                                    校驗狀態：${item.status.http_code === 200 ? '🟢 穩定' : '🔴 異常'} | ${new Date(item.status.verified_at).toLocaleString('zh-TW')}
                                </div>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', cardHtml);
                });

            } catch (err) {
                console.error(err);
                debug.style.display = 'block';
                debug.innerText = `[錯誤診斷報告]\n${err.message}\n\n請檢查 data/news_sources.json 內容是否被誤刪了符號，或檔案尚未上傳成功。`;
                container.innerHTML = '<div class="col-12 text-center text-danger py-5"><h5>資料載入失敗，詳見上方診斷報告。</h5></div>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadNews);
    </script>
</body>
</html>
