<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data:; connect-src 'self';">
    <title>全球新聞導航 - 安全加固版</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: system-ui, -apple-system, sans-serif; }
        .navbar { background-color: #1a1a1a !important; }
        .card { border: none; border-radius: 10px; transition: transform 0.2s; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .card:hover { transform: translateY(-5px); }
        .realist-note { background-color: #fff3cd; border-left: 4px solid #ffc107; padding: 10px; font-size: 0.85rem; border-radius: 4px; }
        #error-display { display: none; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark mb-4 shadow-sm">
        <div class="container">
            <span class="navbar-brand fw-bold">🌐 全球新聞導航系統</span>
        </div>
    </nav>

    <div class="container">
        <div id="error-display" class="alert alert-danger shadow-sm"></div>

        <div id="news-container" class="row">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-secondary" role="status"></div>
                <p class="mt-3 text-muted">正在通過安全政策校驗並載入數據...</p>
            </div>
        </div>
    </div>

    <script>
        // 嚴格執行：避免使用 eval()，改用安全的 JSON.parse
        async function secureLoad() {
            const container = document.getElementById('news-container');
            const errorBox = document.getElementById('error-display');

            try {
                // 加入版本號防止 Cache 導致的舊政策衝突
                const timestamp = new Date().getTime();
                const response = await fetch(`./data/news_sources.json?v=${timestamp}`);
                
                if (!response.ok) throw new Error(`連線失敗 (HTTP ${response.status})`);
                
                const data = await response.json();
                
                container.innerHTML = ''; // 清除讀取中狀態

                data.forEach(item => {
                    // 使用安全字串模板
                    const cardTemplate = `
                        <div class="col-md-6 col-lg-4 mb-4">
                            <div class="card h-100">
                                <div class="card-body">
                                    <div class="d-flex justify-content-between align-items-start mb-2">
                                        <h6 class="fw-bold m-0">${item.media_name}</h6>
                                        <span class="badge bg-dark" style="font-size: 0.7rem;">${item.geopolitical_block}</span>
                                    </div>
                                    <p class="text-muted" style="font-size: 0.75rem;">${item.geographic_info.continent} · ${item.attributes.media_type}</p>
                                    <div class="realist-note mb-3">
                                        <strong>現實主義評註：</strong><br>${item.realist_note}
                                    </div>
                                    <a href="${item.links.official_url}" target="_blank" class="btn btn-outline-primary btn-sm w-100">開啟新聞源</a>
                                </div>
                                <div class="card-footer bg-transparent border-0 text-muted" style="font-size: 0.7rem;">
                                    校驗時間：${new Date(item.status.verified_at).toLocaleString()}
                                </div>
                            </div>
                        </div>`;
                    // 使用 insertAdjacentHTML 比 innerHTML 更符合安全規範
                    container.insertAdjacentHTML('beforeend', cardTemplate);
                });

            } catch (err) {
                console.error("CSP 或 資料讀取錯誤:", err);
                container.style.display = 'none';
                errorBox.style.display = 'block';
                errorBox.textContent = `[系統警報]：${err.message}。這可能是因為 JSON 格式損壞或 GitHub Actions 尚未完成資料同步。`;
            }
        }

        // 監聽載入事件，不使用內嵌 onclick
        window.addEventListener('DOMContentLoaded', secureLoad);
    </script>
</body>
</html>
