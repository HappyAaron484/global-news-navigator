name: Global News Auto-Maintenance & Deploy

on:
  schedule:
    - cron: '0 4 * * *' # 每日 UTC 04:00 (台灣中午 12 點)
  workflow_dispatch: # 允許手動執行

# 3W 標註: Who: Senior Analyst / Where: GitHub Workflow / When: 2026-03-18
permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 強制啟用 Node.js 24 環境

jobs:
  build-and-deploy:
    # 這是修復 400 錯誤的關鍵：必須宣告環境名稱
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Update News Data
        run: python scripts/maintainer.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "System-Automator"
          git config --global user.email "automator@github.com"
          git add data/news_sources.json
          git commit -m "Auto-update: News source verified [Skip CI]" || exit 0
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 部署根目錄下的所有靜態檔案

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
