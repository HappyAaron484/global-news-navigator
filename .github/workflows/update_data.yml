name: Global News Auto-Maintenance

on:
  schedule:
    - cron: '0 4 * * *' # 每日 UTC 04:00 (台灣中午 12 點) 自動執行
  workflow_dispatch: # 允許您在 Actions 頁面隨時手動觸發執行

env:
  # 3W 標註: 
  # Where: GitHub Actions Documentation
  # Who: Senior System Analyst
  # When: 2026-03-17
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 強制啟用 Node.js 24 環境以消除棄用警告

jobs:
  update-database:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # 採用支援 Node.js 24 的最新版本

      - name: Set up Python
        uses: actions/setup-python@v5 # 採用支援 Node.js 24 的最新版本
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Maintainer Script
        run: python scripts/maintainer.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "System-Automator"
          git config --global user.email "automator@github.com"
          git add data/news_sources.json
          git commit -m "Auto-update: News source status [Skip CI]" || exit 0
          git push
