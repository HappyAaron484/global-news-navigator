<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Global News Navigator | 地緣政治控制台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); padding-bottom: 60px; }
        .filter-bar { background: var(--card); border: 1px solid #30363d; padding: 15px; border-radius: 8px; margin-bottom: 25px; }
        .btn-filter { color: #8b949e; border: 1px solid #30363d; margin: 2px; }
        .btn-filter.active { background: #21262d; border-color: var(--accent); color: var(--accent); }
        .card { background: var(--card); border: 1px solid #30363d; height: 100%; }
        
        /* RSS Ticker Style */
        .ticker-wrap {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 40px;
            background: #010409; border-top: 1px solid var(--accent);
            z-index: 9999; overflow: hidden; line-height: 40px;
        }
        .ticker-move {
            display: inline-block; white-space: nowrap; padding-right: 100%;
            animation: ticker 60s linear infinite;
        }
        .ticker-item { display: inline-block; padding: 0 50px; color: var(--accent); font-weight: bold; font-size: 0.9rem; }
        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark border-bottom border-secondary mb-4">
    <div class="container">
        <span class="navbar-brand fw-bold">🌐 Global News Navigator</span>
    </div>
</nav>

<div class="container">
    <div class="filter-bar shadow-sm">
        <div class="small text-muted mb-2">區域戰略過濾器：</div>
        <div id="filter-btns">
            <button class="btn btn-sm btn-filter active" onclick="applyFilter('All')">全部顯示</button>
            <button class="btn btn-sm btn-filter" onclick="applyFilter('印太')">印太 / 第一島鏈</button>
            <button class="btn btn-sm btn-filter" onclick="applyFilter('北美')">北美核心</button>
            <button class="btn btn-sm btn-filter" onclick="applyFilter('歐洲')">歐洲大陸</button>
            <button class="btn btn-sm btn-filter" onclick="applyFilter('中東')">中東能源</button>
            <button class="btn btn-sm btn-filter" onclick="applyFilter('BRICS+')">金磚 / 南半球</button>
        </div>
    </div>

    <div id="news-grid" class="row"></div>
</div>

<div class="ticker-wrap">
    <div id="ticker-content" class="ticker-move">正在連結全球 RSS 衛星...</div>
</div>

<script>
    let db = [];

    async function init() {
        try {
            // 讀取 RSS 數據
            const tickerRes = await fetch('data/ticker.json?t=' + Date.now());
            const tickerData = await tickerRes.json();
            document.getElementById('ticker-content').innerHTML = tickerData.headlines.map(h => `<span class="ticker-item">${h}</span>`).join('');

            // 讀取媒體數據
            const res = await fetch('data/news_sources.json?t=' + Date.now());
            db = await res.json();
            applyFilter('All');
        } catch (e) { console.error(e); }
    }

    function applyFilter(reg) {
        // 更新按鈕狀態
        document.querySelectorAll('.btn-filter').forEach(b => {
            b.classList.toggle('active', b.innerText.includes(reg) || (reg === 'All' && b.innerText === '全部顯示'));
        });

        const grid = document.getElementById('news-grid');
        grid.innerHTML = '';

        // 修復後的嚴格過濾邏輯
        const filtered = reg === 'All' ? db : db.filter(i => i.region === reg || i.geopolitical_block.includes(reg));

        filtered.forEach(item => {
            grid.innerHTML += `
                <div class="col-md-6 mb-4">
                    <div class="card p-3">
                        <div class="d-flex justify-content-between">
                            <h6 class="fw-bold text-white">${item.media_name}</h6>
                            <span class="badge bg-dark border border-secondary">${item.region}</span>
                        </div>
                        <div class="small text-warning mt-2">${item.funding_tag}</div>
                        <p class="small text-muted mt-2" style="font-size: 0.8rem;">${item.analysis.narrative_logic}</p>
                        <a href="${item.links.official_url}" target="_blank" class="btn btn-sm btn-outline-primary mt-auto">情報訪問</a>
                    </div>
                </div>`;
        });
    }

    window.onload = init;
</script>
</body>
</html>
