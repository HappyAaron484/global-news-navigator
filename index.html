<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global News Navigator | 地緣政治控制台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --accent: #58a6ff; --text: #c9d1d9; }
        body { background: var(--bg); color: var(--text); padding-bottom: 70px; font-family: sans-serif; }
        .navbar { background: #010409 !important; border-bottom: 1px solid var(--border); }
        .filter-bar { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 25px; }
        .btn-filter { color: #8b949e; border: 1px solid var(--border); margin: 3px; font-size: 0.85rem; }
        .btn-filter.active { background: #21262d; border-color: var(--accent); color: var(--accent); }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; height: 100%; transition: 0.2s; }
        .card:hover { border-color: #8b949e; }
        
        /* RSS Ticker - 強化動態效果 */
        .ticker-wrap {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 45px;
            background: rgba(1, 4, 9, 0.95); border-top: 2px solid var(--accent);
            z-index: 10000; overflow: hidden; line-height: 45px; backdrop-filter: blur(5px);
        }
        .ticker-move {
            display: inline-block; white-space: nowrap; padding-right: 100%;
            animation: ticker-anim 80s linear infinite;
        }
        .ticker-item { display: inline-block; padding: 0 40px; color: var(--accent); font-weight: 500; font-size: 0.9rem; }
        .ticker-source { color: #8b949e; margin-right: 8px; font-size: 0.75rem; border: 1px solid #30363d; padding: 1px 5px; border-radius: 3px; }
        @keyframes ticker-anim {
            0% { transform: translateX(0); }
            100% { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container d-flex justify-content-between">
        <span class="navbar-brand fw-bold">🌐 Global News Navigator</span>
        <span class="text-muted small" id="system-time">系統校驗中...</span>
    </div>
</nav>

<div class="container">
    <div class="filter-bar shadow-sm">
        <div class="small text-muted mb-2">戰略區域篩選：</div>
        <div id="filter-btns">
            <button class="btn btn-sm btn-filter active" onclick="applyFilter('All')">全部顯示</button>
            <button class="btn btn-sm btn-filter" onclick="applyFilter('印太')">印太 / 第一島鏈</button>
            <button class="btn btn-sm btn-filter" onclick="applyFilter('北美')">北美核心</button>
            <button class="btn btn-sm btn-filter" onclick="applyFilter('歐洲')">歐洲大陸</button>
            <button class="btn btn-sm btn-filter" onclick="applyFilter('中東')">中東能源</button>
            <button class="btn btn-sm btn-filter" onclick="applyFilter('BRICS+')">金磚 / 南半球</button>
        </div>
    </div>

    <div id="news-grid" class="row">
        <div class="col-12 text-center py-5" id="main-loader">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3 text-muted">正在載入全球媒體庫...</p>
        </div>
    </div>
</div>

<div class="ticker-wrap">
    <div id="ticker-content" class="ticker-move">正在載入即時新聞源... (初次部署需等待 1-2 分鐘)</div>
</div>

<script>
    let mediaDB = [];

    // 獨立載入 RSS 頭條 (不會阻塞主程式)
    async function loadTicker() {
        try {
            const res = await fetch('data/ticker.json?v=' + Date.now());
            if (!res.ok) throw new Error();
            const data = await res.json();
            if (data.headlines && data.headlines.length > 0) {
                document.getElementById('ticker-content').innerHTML = data.headlines.map(h => `<span class="ticker-item">${h}</span>`).join('');
                document.getElementById('system-time').innerText = `更新時間: ${new Date(data.updated_at).toLocaleString()}`;
            }
        } catch (e) {
            document.getElementById('ticker-content').innerHTML = `<span class="ticker-item text-muted">即時新聞衛星連線中... 待數據產出後自動更新</span>`;
            document.getElementById('system-time').innerText = "系統離線維護中";
        }
    }

    // 獨立載入媒體卡片
    async function loadMedia() {
        try {
            const res = await fetch('data/news_sources.json?v=' + Date.now());
            if (!res.ok) throw new Error("無法讀取數據庫檔案");
            mediaDB = await res.json();
            applyFilter('All');
        } catch (e) {
            document.getElementById('news-grid').innerHTML = `<div class="col-12 alert alert-danger">媒體庫載入失敗: ${e.message}</div>`;
        }
    }

    function applyFilter(reg) {
        // 更新按鈕外觀
        document.querySelectorAll('.btn-filter').forEach(btn => {
            btn.classList.toggle('active', btn.innerText.includes(reg) || (reg === 'All' && btn.innerText === '全部顯示'));
        });

        const grid = document.getElementById('news-grid');
        grid.innerHTML = '';

        // 嚴格分類邏輯
        const filtered = (reg === 'All') 
            ? mediaDB 
            : mediaDB.filter(item => (item.region === reg) || (item.geopolitical_block && item.geopolitical_block.includes(reg)));

        if (filtered.length === 0) {
            grid.innerHTML = '<div class="col-12 text-center py-5 text-muted">該區域暫無媒體數據</div>';
            return;
        }

        filtered.forEach(item => {
            const status = item.status || { is_live: false };
            grid.innerHTML += `
                <div class="col-xl-6 col-lg-6 mb-4">
                    <div class="card p-4">
                        <div class="d-flex justify-content-between mb-2">
                            <h6 class="fw-bold text-white mb-0">${item.media_name}</h6>
                            <span class="badge bg-dark border border-secondary" style="font-size:0.7rem;">${item.region}</span>
                        </div>
                        <div class="d-flex align-items-center mb-3">
                            <span class="badge bg-opacity-10 ${item.funding_tag.includes('官方') ? 'text-danger' : 'text-success'}" style="font-size:0.7rem; border:1px solid currentColor;">${item.funding_tag}</span>
                            <span class="ms-2 ${status.is_live ? 'text-success' : 'text-danger'}" style="font-size:0.7rem;">
                                ● ${status.is_live ? 'Online' : 'Offline'}
                            </span>
                        </div>
                        <p class="small text-muted" style="font-size: 0.85rem; line-height: 1.5;">${item.analysis.narrative_logic}</p>
                        <div class="mt-auto d-flex justify-content-between align-items-center pt-2">
                            <span class="text-muted" style="font-size: 0.7rem;">價值: ${item.analysis.strategic_value}</span>
                            <a href="${item.links.official_url}" target="_blank" class="btn btn-sm btn-outline-primary px-3" style="font-size:0.75rem;">情報源</a>
                        </div>
                    </div>
                </div>`;
        });
    }

    // 初始化啟動
    window.onload = () => {
        loadMedia();
        loadTicker();
    };
</script>
</body>
</html>
