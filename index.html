<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global News Navigator | 地緣政治實戰系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
            --accent-blue: #58a6ff;
            --tag-official: #f85149;   /* 國家官方-紅 */
            --tag-public: #1f6feb;     /* 政府資助-藍 */
            --tag-private: #238636;    /* 私營商業-綠 */
        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .navbar { background-color: #010409 !important; border-bottom: 1px solid var(--border-color); }
        .filter-container { background: #161b22; padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 30px; }
        .btn-filter { color: var(--text-muted); border: 1px solid var(--border-color); margin: 4px; transition: 0.2s; }
        .btn-filter:hover, .btn-filter.active { background: #21262d; border-color: var(--accent-blue); color: var(--accent-blue); }
        
        .card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 6px; height: 100%; transition: transform 0.2s, border-color 0.2s; }
        .card:hover { border-color: #8b949e; transform: translateY(-2px); }
        .card-header { background: transparent; border-bottom: 1px solid var(--border-color); padding: 1rem; }
        
        .funding-badge { font-size: 0.75rem; padding: 2px 8px; border-radius: 12px; font-weight: bold; }
        .badge-official { background: rgba(248, 81, 73, 0.15); color: var(--tag-official); border: 1px solid var(--tag-official); }
        .badge-public { background: rgba(31, 111, 235, 0.15); color: var(--tag-public); border: 1px solid var(--tag-public); }
        .badge-private { background: rgba(35, 134, 54, 0.15); color: var(--tag-private); border: 1px solid var(--tag-private); }
        
        .strategic-value { font-size: 0.85rem; color: #ffa657; border-left: 3px solid #ffa657; padding-left: 10px; margin-bottom: 15px; }
        .analysis-text { font-size: 0.9rem; color: var(--text-main); line-height: 1.6; }
        .funding-details { font-size: 0.8rem; color: var(--text-muted); font-style: italic; background: #0d1117; padding: 10px; border-radius: 4px; margin-top: 10px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background-color: #238636; box-shadow: 0 0 5px #238636; }
        .offline { background-color: #f85149; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container d-flex justify-content-between">
        <span class="navbar-brand fw-bold text-white">🌐 Global News Navigator</span>
        <span class="text-muted small">系統時間: 2026-03-18</span>
    </div>
</nav>

<div class="container">
    <div class="filter-container shadow-sm">
        <div class="small text-muted mb-2 fw-bold">區域戰略過濾器：</div>
        <div id="filter-buttons">
            <button class="btn btn-sm btn-filter active" onclick="filterBy('All')">全部 (40)</button>
            <button class="btn btn-sm btn-filter" onclick="filterBy('印太')">印太 / 第一島鏈</button>
            <button class="btn btn-sm btn-filter" onclick="filterBy('北美')">北美核心</button>
            <button class="btn btn-sm btn-filter" onclick="filterBy('歐洲')">歐洲大陸</button>
            <button class="btn btn-sm btn-filter" onclick="filterBy('中東')">中東能源</button>
            <button class="btn btn-sm btn-filter" onclick="filterBy('BRICS+')">金磚 / 南半球</button>
        </div>
    </div>

    <div id="news-grid" class="row">
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3 text-muted">正在校驗全球情報連線狀態...</p>
        </div>
    </div>
</div>

<footer class="py-5 text-center text-muted small">
    <hr style="border-color: var(--border-color)">
    3W 標註: Who: Senior Analyst | Where: Global Media Intelligence | When: 2026-03-18
</footer>

<script>
    let rawData = [];

    async function fetchData() {
        try {
            const res = await fetch('data/news_sources.json?t=' + Date.now());
            rawData = await res.json();
            render(rawData);
        } catch (e) {
            document.getElementById('news-grid').innerHTML = `<div class="alert alert-danger">系統初始化失敗: ${e.message}</div>`;
        }
    }

    function getBadgeClass(tag) {
        if (tag.includes('國家官方')) return 'badge-official';
        if (tag.includes('政府資助') || tag.includes('國家資助')) return 'badge-public';
        return 'badge-private';
    }

    function render(data) {
        const grid = document.getElementById('news-grid');
        grid.innerHTML = '';
        
        data.forEach(item => {
            const status = item.status || { is_live: false, verified_at: 'N/A' };
            const timeStr = status.verified_at !== 'N/A' ? new Date(status.verified_at).toLocaleString('zh-TW') : '未經校驗';
            
            grid.innerHTML += `
                <div class="col-xl-6 col-lg-6 col-md-12 mb-4">
                    <div class="card">
                        <div class="card-header d-flex justify-content-between align-items-center">
                            <div>
                                <h5 class="mb-1 fw-bold text-white">${item.media_name}</h5>
                                <span class="funding-badge ${getBadgeClass(item.funding_tag)}">${item.funding_tag}</span>
                                <span class="ms-2 badge bg-dark text-muted border border-secondary">${item.geopolitical_block}</span>
                            </div>
                            <div class="text-end">
                                <div class="small ${status.is_live ? 'text-success' : 'text-danger'}">
                                    <span class="status-dot ${status.is_live ? 'online' : 'offline'}"></span>
                                    ${status.is_live ? '連線中' : '離線'}
                                </div>
                            </div>
                        </div>
                        <div class="card-body">
                            <div class="strategic-value">
                                <strong>戰略價值:</strong> ${item.analysis.strategic_value}
                            </div>
                            <div class="analysis-text mb-3">
                                ${item.analysis.narrative_logic}
                            </div>
                            <div class="funding-details">
                                <strong>資金背景:</strong> ${item.funding_details}
                            </div>
                        </div>
                        <div class="card-footer bg-transparent border-top-0 d-flex justify-content-between align-items-center pb-3">
                            <span class="text-muted" style="font-size: 0.7rem;">最後校驗: ${timeStr}</span>
                            <a href="${item.links.official_url}" target="_blank" class="btn btn-sm btn-outline-primary px-3">訪問情報源</a>
                        </div>
                    </div>
                </div>`;
        });
    }

    function filterBy(region) {
        // 切換按鈕樣式
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');

        if (region === 'All') {
            render(rawData);
        } else if (region === 'BRICS+') {
            render(rawData.filter(i => i.geopolitical_block.includes('BRICS+') || i.region === 'BRICS+'));
        } else {
            render(rawData.filter(i => i.region === region));
        }
    }

    window.onload = fetchData;
</script>
</body>
</html>
